name: uploading and downloading artifacts
on: workflow_dispatch

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: create artifact les go
        run: echo "was good my fama lam" > tester.txt
      - name: uplaoding an artifact yesir
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          path: ./tester.txt
          name: tester
  job2:
    runs-on: ubuntu-latest
    steps:
      - name: download the artifact kaboom
        uses: actions/download-artifact@v8
        with:
          name: tester
      - name: echo the artifact
        run: cat tester.txt
    needs: job1
