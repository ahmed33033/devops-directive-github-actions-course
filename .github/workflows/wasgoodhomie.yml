name: caching workflow
on: workflow_dispatch

jobs:
  job1:
    name: job1 waws good fam
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: tester
      - name: cache it les go
        uses: actions/cache@main
        id: cache_step
        with:
          path: cached_text.txt
          key: ${{github.event.sender}}x-${{hashFiles('cached**')}}
      # - name: use cache les go
      #   if: steps.cache_step.outputs.cache-hit != 'true'
      #   run: |
      #     echo  "was good fam\nwe want this cached yo\nbye boy" > cached_text.txt
      - name: cat it out
        run: cat cached_text.txt
