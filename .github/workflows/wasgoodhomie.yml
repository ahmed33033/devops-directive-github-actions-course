name: my awesome workflow
on:
  workflow_dispatch:
jobs:
  first_job_yo:
    runs-on: ubuntu-latest
    steps:
      - name: say wasgood
        run: |
          print("joe=mama", file=GITHUB_OUTPUT)
        shell: python
  second_job:
    runs-on: ubuntu-latest
    steps:
      - name: we done
        run: |
          echo we done out here
          echo yea we done: ${{needs.first_job_yo.outputs.joe}}
    needs: first_job_yo
