name: secrets and vars
on: workflow_dispatch

jobs:
  job1:
    environment: staging
    name: staging environment
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo " staging secret: ${{secrets.STAGING_SECRET}}"
          echo "staging var: ${{vars.STAGING_VAR}}"
  job2:
    environment: production
    name: production environment
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "prod secret: ${{secrets.PROD_SECRET}}"
          echo "prod var: ${{vars.PROD_VAR}}"
  job3:
    name: default env
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "repo secret: ${{secrets.REPO_SECRET}}""
          echo "repo var: ${{vars.REPO_VAR}}"
