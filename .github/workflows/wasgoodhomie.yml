name: dependent workflow
on: workflow_dispatch

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: step1
        run: echo step1 was good
  job2:
    runs-on: ubuntu-latest
    steps:
      - name: step1 from job2
        run: echo deux
  job3:
    runs-on: ubuntu-latest
    steps:
      - name: dependent step from dependent job
        run: echo was goooooood dependent
    needs:
      - job1
      - job2
