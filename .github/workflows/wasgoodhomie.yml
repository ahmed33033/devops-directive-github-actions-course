name: caching workflow
on: workflow_dispatch

jobs:
  job1:
    name: job1 waws good fam
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: tester
      - name: cache it les go
        uses: actions/cache@main
        id: cache_step
        with:
          path: cached_text.txt
          key: ${{github.event.sender}}--${{hashFiles('cached**')}}
      - name: cat it out
        run: cat cached_text.txt
