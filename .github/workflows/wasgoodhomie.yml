name: my awesome workflow
on:
  workflow_dispatch:
jobs:
  first_job_yo:
    runs-on: ubuntu-latest
    steps:
      - name: say wasgood
        run: |
          from os import environ
          git_output = environ.get("GITHUB_OUTPUT", None)
          if git_output is None:
              raise OSError("env not found")
          with open(git_output, "a") as f:
                  print("joe=mama", file=f)
        shell: python
  second_job:
    runs-on: ubuntu-latest
    steps:
      - name: we done
        run: |
          echo we done out here
          echo yea we done: ${{needs.first_job_yo.outputs.joe}}
    needs: first_job_yo
